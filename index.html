<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoking Lust — Trench Crusade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0505;--card-bg:#1a0a0a;--accent:#8b1a1a;--accent-br:#c0332a;
  --gold:#c9a84c;--text:#d4c5a9;--dim:#8a7a65;--border:#5c1a1a;
  --inj:#7a0000;--kw:#2a1a1a;--warn-bg:#3a1a00;--warn-border:#8b5a00;
  --glow:0 0 8px rgba(139,26,26,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Palatino Linotype',Georgia,serif;font-size:14px;line-height:1.5;min-height:100vh}
h1,h2,h3,.gothic{font-family:'Cinzel','Palatino Linotype',Georgia,serif}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* HEADER */
.hdr{background:linear-gradient(180deg,#1f0808 0%,var(--card-bg) 100%);border-bottom:2px solid var(--accent);padding:12px 14px;box-shadow:var(--glow);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.wband-name{font-size:22px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 12px rgba(201,168,76,0.5)}
.faction-line{color:var(--dim);font-size:11px;margin-top:2px}
.hdr-ctrl{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:4px 9px;font-size:11px;border-radius:2px}
.btn:hover{border-color:var(--accent);color:var(--gold)}
.btn-lang{font-family:'Cinzel',serif;font-weight:600}
.hdr-stats{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;align-items:center}
.spill{background:var(--kw);border:1px solid var(--border);padding:2px 8px;border-radius:10px;font-size:11px}
.spill strong{color:var(--gold)}
.sync-badge{font-size:10px;color:#4caa77;margin-left:4px;display:none}
.tc-id-row{display:flex;align-items:center;gap:5px;margin-top:5px}
.tc-id-lbl{font-size:10px;color:var(--dim)}
.tc-id-input{background:#110606;border:1px solid var(--border);color:var(--gold);font-family:monospace;font-size:11px;padding:2px 6px;border-radius:2px;width:72px;outline:none}
.tc-id-input:focus{border-color:var(--accent)}
.tc-id-btn{font-size:11px;padding:2px 7px}

/* WARNING BOX */
.warn-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-left:4px solid var(--gold);margin:10px;padding:10px 12px;border-radius:2px}
.warn-box h3{color:var(--gold);font-size:12px;margin-bottom:7px;letter-spacing:1px}
.warn-item{display:flex;gap:8px;margin-bottom:5px;font-size:12px;line-height:1.4}
.warn-icon{flex-shrink:0}

/* COLLAPSIBLE SECTION */
.sec{margin:10px;border:1px solid var(--border);border-radius:2px;overflow:hidden}
.sec-hdr{background:var(--accent);padding:7px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sec-hdr h2{font-size:13px;letter-spacing:2px;color:var(--text)}
.chevron{transition:transform 0.2s;font-size:10px;color:var(--text)}
.sec.collapsed .chevron{transform:rotate(-90deg)}
.sec-body{padding:12px;display:block}
.sec.collapsed .sec-body{display:none}

/* CHECKLIST */
.chk-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:12px}
.chk-item input{width:15px;height:15px;flex-shrink:0;accent-color:var(--accent-br);margin-top:2px}
.chk-item label{cursor:pointer;line-height:1.4}
.chk-item input:checked+label{color:var(--dim);text-decoration:line-through}

/* UNIT LIST */
.grp-hdr{background:#110606;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 12px;font-size:10px;letter-spacing:3px;color:var(--accent-br);text-transform:uppercase;font-family:'Cinzel',serif}
.unit-card{border-bottom:1px solid var(--border);background:var(--card-bg)}
.unit-card:last-child{border-bottom:none}
.unit-hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;user-select:none}
.unit-hdr:hover{background:#200a0a}

.tbadge{font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;font-family:'Cinzel',serif;flex-shrink:0}
.t-elite{background:var(--accent);color:var(--text)}
.t-troop{background:#1a1a3a;color:#8888cc}
.t-merc{background:#1a2a1a;color:#88cc88}
.t-reserve{background:#2a2a1a;color:#cccc88}

.uname{font-family:'Cinzel',serif;font-size:12px;flex:1;color:var(--text);line-height:1.3}
.uname.dead{color:var(--dim);text-decoration:line-through}
.ucost{font-size:10px;color:var(--dim);flex-shrink:0}
.xp-badge{font-size:9px;color:#4caa77;background:#0a1a0a;border:1px solid #2a4a2a;padding:1px 5px;border-radius:8px;flex-shrink:0}

.uqs{display:flex;gap:5px;font-size:10px;color:var(--dim);flex-shrink:0}
.uq{text-align:center;min-width:28px}
.uq-lbl{font-size:8px;color:#4a3a2a;display:block;letter-spacing:0.5px}

.inj-dot{width:7px;height:7px;border-radius:50%;background:var(--inj);flex-shrink:0;display:none}
.inj-dot.on{display:block}
.bm-mini{font-size:11px;color:var(--gold);min-width:18px;text-align:right;display:none}
.bm-mini.on{display:block}
.chv-u{font-size:9px;color:var(--dim);flex-shrink:0;transition:transform 0.2s}
.unit-card.open .chv-u{transform:rotate(180deg)}

/* UNIT BODY */
.unit-body{display:none;padding:0 10px 10px}
.unit-card.open .unit-body{display:block}

.stats-row{display:flex;gap:8px;margin-bottom:9px;flex-wrap:wrap;align-items:center;margin-top:6px}
.sbox{text-align:center;background:#110606;border:1px solid var(--border);padding:3px 7px;border-radius:2px;min-width:40px}
.sval{font-size:15px;font-weight:600;color:var(--gold);display:block}
.slbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.kws{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.kw{background:var(--kw);border:1px solid #3a2a2a;color:var(--dim);font-size:10px;padding:2px 6px;border-radius:10px}
.kw.kw-w{border-color:var(--gold);color:var(--gold)}

/* BLOCKS */
.blk-title{font-size:10px;letter-spacing:2px;color:var(--accent-br);text-transform:uppercase;margin:9px 0 5px;border-bottom:1px solid var(--border);padding-bottom:2px}
.weap-card{background:#110606;border:1px solid var(--border);border-radius:2px;padding:5px 8px;margin-bottom:5px}
.weap-hdr{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:3px}
.weap-name{font-size:12px;font-weight:600;color:var(--text)}
.wstat{font-size:10px;color:var(--dim);background:#1a0a0a;padding:1px 5px;border-radius:8px}
.weap-rule{font-size:11px;color:var(--dim);line-height:1.4}

.abl-card{background:#110606;border-left:3px solid var(--border);padding:5px 8px;margin-bottom:5px}
.abl-card.goetic{border-left-color:var(--gold)}
.abl-card.alert{border-left-color:var(--accent-br)}
.abl-hdr{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.abl-name{font-size:12px;font-weight:600;color:var(--text)}
.gcost{font-size:10px;background:#2a1a00;border:1px solid var(--gold);color:var(--gold);padding:1px 5px;border-radius:8px}
.abl-desc{font-size:11px;color:var(--dim);line-height:1.4}

/* INJURIES */
.inj-badge{display:flex;align-items:flex-start;gap:7px;background:var(--inj);border:1px solid #aa0000;padding:5px 8px;border-radius:2px;margin-bottom:4px}
.inj-badge input{accent-color:#ff4444;margin-top:2px;flex-shrink:0}
.inj-name{font-size:11px;font-weight:600;color:#ffcccc;line-height:1.3}
.inj-eff{font-size:10px;color:#cc9999;line-height:1.4;margin-top:2px}

/* ADV BADGE */
.adv-badge{display:inline-flex;align-items:center;gap:5px;background:#1a2a1a;border:1px solid #2a4a2a;padding:3px 8px;border-radius:2px;margin-bottom:4px;font-size:11px}
.adv-name{color:#88cc88;font-weight:600}
.adv-desc{color:var(--dim);font-size:10px}

/* BM COUNTER */
.bm-ctr{display:flex;align-items:center;gap:7px;margin-top:9px;padding:7px 8px;background:#110606;border:1px solid var(--border);border-radius:2px;flex-wrap:wrap}
.bm-pips{display:flex;gap:4px;flex:1;flex-wrap:wrap;min-height:14px}
.bm-pip{width:13px;height:13px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;transition:background 0.1s}
.bm-pip.filled{background:var(--accent-br);border-color:var(--accent-br)}
.bm-btn{background:#1a0a0a;border:1px solid var(--border);color:var(--text);width:22px;height:22px;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:2px;flex-shrink:0;padding-bottom:2px}
.bm-btn:hover{border-color:var(--accent)}
.bm-count{font-size:12px;color:var(--gold);min-width:18px;text-align:center;font-weight:600}
.bm-lbl{font-size:9px;color:var(--dim);flex-shrink:0}

/* TACTICS */
.tactics{font-style:italic;font-size:11px;color:var(--dim);border-left:2px solid var(--border);padding-left:8px;margin-top:8px;line-height:1.5}

/* BM TABLE */
.bm-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.bm-table th{background:var(--accent);padding:4px 8px;text-align:left;font-size:11px;letter-spacing:1px}
.bm-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
.bm-table tr:last-child td{border-bottom:none}

/* FOOTER CONTROLS */
.reset-bar{display:flex;gap:8px;padding:12px;justify-content:flex-end;border-top:1px solid var(--border);margin-top:10px}
.btn-danger{background:#3a0808;border:1px solid var(--accent);color:var(--text);padding:6px 14px;border-radius:2px}
.btn-danger:hover{background:#5a1010}

/* PRINT */
@media print{
  .hdr{position:static}
  .hdr-ctrl,.reset-bar,.bm-ctr,.warn-box,.tc-id-row{display:none!important}
  .sec.collapsed .sec-body,.unit-body{display:block!important}
  .sec-hdr .chevron,.chv-u{display:none}
  body{background:white;color:black;font-size:11px}
  .card-bg,.unit-card,.hdr{background:white;border-color:#999}
  .gold,.wband-name,.sval,.gcost,.abl-name,.weap-name{color:#333}
  .kw,.spill{background:#eee;border-color:#ccc;color:#333}
  .inj-badge{background:#fdd;border-color:#c99}
  .adv-badge{background:#dfd;border-color:#9c9}
  .abl-card{border-left-color:#999}
  .tactics{border-left-color:#999}
  .unit-card{page-break-inside:avoid;margin-bottom:6px}
}
@media(max-width:380px){
  .uqs{display:none}
  .wband-name{font-size:18px}
}
#loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading-overlay .lo-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent-br);border-radius:50%;animation:spin 0.9s linear infinite}
#loading-overlay .lo-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);letter-spacing:3px}
#loading-overlay .lo-sub{font-size:12px;color:var(--dim)}
@keyframes spin{to{transform:rotate(360deg)}}
/* Campaign overview */
.camp-hdr{text-align:center;padding:20px 14px 12px;border-bottom:1px solid var(--border);position:relative}
.camp-title{font-size:26px;color:var(--gold);letter-spacing:4px;margin-bottom:4px}
.camp-sub{font-size:11px;color:var(--dim);margin-bottom:12px}
.camp-lang{position:absolute;top:18px;right:14px}
.camp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}
@media(max-width:380px){.camp-grid{grid-template-columns:1fr}}
.wb-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:12px;cursor:pointer;transition:border-color 0.15s}
.wb-card:hover{border-color:var(--accent-br)}
.wb-card-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:6px;line-height:1.3}
.wb-card-stats{display:flex;gap:6px;flex-wrap:wrap;font-size:10px;color:var(--text)}
.wb-card-stat{background:var(--kw);border:1px solid var(--border);padding:1px 6px;border-radius:8px}
.wb-card-alert{border-left:3px solid var(--accent-br)}
.wb-card-faction{font-size:10px;color:var(--dim);margin-bottom:6px}
.wb-alert{color:var(--gold);border-color:var(--accent)}
.roll-btn{font-size:10px;padding:2px 6px;margin:0 2px;border-radius:2px;background:var(--kw);border:1px solid var(--border);color:var(--text);cursor:pointer}
.roll-btn.roll-hit{background:#5a1a1a;border-color:#c0332a;color:#ff8888}
.roll-btn.roll-clear{background:#1a3a1a;border-color:#339933;color:#88cc88}
.roll-zone{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:11px;flex-wrap:wrap}
.sbox.penalized .sval{color:#e05a30;text-decoration:line-through}
.sbox.penalized::after{content:'-1D';font-size:9px;color:#e05a30;display:block}
.unit-card.starts-down{border-left:3px solid #e05a30}
.unit-card.starts-down .uname::after{content:' [DOWN]';color:#e05a30;font-size:10px}
</style>
</head>
<body>

<div id="campaign-view" style="display:none">
  <div class="camp-hdr">
    <div class="camp-title gothic">TRENCH CRUSADE</div>
    <div class="camp-sub" id="camp-sub">lFdM 2026</div>
    <button class="btn btn-lang camp-lang" id="camp-lang-btn" onclick="toggleLang()">EN</button>
  </div>
  <div class="camp-grid" id="camp-grid"></div>
</div>

<div id="detail-view" style="display:none">

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="wband-name gothic" id="hdr-name">Smoking Lust</div>
      <div class="faction-line" id="hdr-faction" data-static="Court of the Seven-Headed Serpent · Infernal Noble">Court of the Seven-Headed Serpent · Infernal Noble</div>
      <div class="faction-line"><a class="tc-link" id="hdr-tc-link" target="_blank">↗ Trench Companion</a><span class="sync-badge" id="sync-badge">⚡ Synced</span></div>
      <div class="tc-id-row">
        <span class="tc-id-lbl">TC ID:</span>
        <input class="tc-id-input" id="tc-id-input" type="text" inputmode="numeric" maxlength="12" placeholder="183662" onkeydown="if(event.key==='Enter')applyTcId()">
        <button class="btn tc-id-btn" onclick="applyTcId()">↻ Sync</button>
      </div>
    </div>
    <div class="hdr-ctrl">
      <button class="btn btn-lang" id="lang-btn" onclick="toggleLang()">EN</button>
      <button class="btn" onclick="resetGame()" title="Reset BMs &amp; checklist">↺ Reset</button>
    </div>
  </div>
  <div class="hdr-stats" id="hdr-stats"></div>
</div>

<div class="warn-box" id="warn-box"></div>

<div class="sec" id="sec-checklist">
  <div class="sec-hdr" onclick="toggleSec('sec-checklist')">
    <h2 data-es="CHECKLIST PRE-PARTIDA" data-en="PRE-GAME CHECKLIST">CHECKLIST PRE-PARTIDA</h2>
    <span class="chevron">▼</span>
  </div>
  <div class="sec-body" id="checklist-body"></div>
</div>

<div class="sec" id="sec-units" style="margin-top:0">
  <div class="sec-hdr" onclick="toggleSec('sec-units')">
    <h2 data-es="BANDA" data-en="WARBAND">BANDA</h2>
    <span class="chevron">▼</span>
  </div>
  <div class="sec-body" style="padding:0" id="units-body"></div>
</div>

<div class="sec" id="sec-goetic">
  <div class="sec-hdr" onclick="toggleSec('sec-goetic')">
    <h2 data-es="MECÁNICA GOÉTICA" data-en="GOETIC MECHANICS">MECÁNICA GOÉTICA</h2>
    <span class="chevron">▼</span>
  </div>
  <div class="sec-body">
    <table class="bm-table">
      <thead><tr><th data-es="Blood Marker en…" data-en="Blood Marker on…"></th><th data-es="Efecto" data-en="Effect"></th></tr></thead>
      <tbody>
        <tr><td data-es="Atacante / modelo activo" data-en="Attacker / active model"></td><td data-es="-1D a todas sus Actions propias" data-en="-1D to all own Actions"></td></tr>
        <tr><td data-es="Objetivo" data-en="Target model"></td><td data-es="+1D en Injury Rolls contra ese modelo" data-en="+1D on Injury Rolls against that model"></td></tr>
        <tr><td data-es="Blessing Marker en activo" data-en="Blessing Marker on active"></td><td data-es="+1D a Actions propias / -1D en Injury Rolls contra él" data-en="+1D to own Actions / -1D on Injury Rolls against"></td></tr>
      </tbody>
    </table>
    <p style="font-size:11px;color:var(--dim);margin-top:10px;line-height:1.5" data-es="Los BM para hechizos GOÉTICOS se retiran de cualquier modelo (aliado o enemigo) sin keyword DEMONIC ni BLACK GRAIL, sin importar distancia ni LoS. El coste puede repartirse entre varios modelos. No se hace Success Roll — paga el coste y el efecto ocurre. Cada hechizo puede lanzarse una vez por Activation del lanzador." data-en="BM for GOETIC spells are removed from any model (friend or foe) without the DEMONIC or BLACK GRAIL keyword, regardless of distance or LoS. The cost can be split across multiple models. No Success Roll needed — pay the cost and the effect happens. Each spell can only be cast once per Activation of the caster."></p>
  </div>
</div>

<div class="sec collapsed" id="sec-faction">
  <div class="sec-hdr" onclick="toggleSec('sec-faction')">
    <h2 data-es="REGLAS DE FACCIÓN" data-en="FACTION RULES">REGLAS DE FACCIÓN</h2>
    <span class="chevron">▼</span>
  </div>
  <div class="sec-body" id="faction-body"></div>
</div>

<div class="reset-bar">
  <button class="btn btn-danger" onclick="resetGame()">
    <span data-es="↺ Nuevo Juego (resetear BM y checklist)" data-en="↺ New Game (reset BMs &amp; checklist)"></span>
  </button>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   CONFIG — Change TC_ID to your Trench Companion warband ID
   ═══════════════════════════════════════════════════════════════════ */
const TC_ID = "183662";
const TC_URL = `https://trench-companion.com/warband/detail/${TC_ID}`;

/* ═══════════════════════════════════════════════════════════════════
   WARBAND DATA
   To use this page for a different warband:
   1. Set TC_ID above to your Trench Companion warband ID
   2. Replace the WARBAND object below with your warband data
   All UI is generated from this object — no other code changes needed.
   ═══════════════════════════════════════════════════════════════════ */
const WARBAND = {
  meta: {
    name: "Smoking Lust",
    faction: {es:"Corte de la Serpiente de Siete Cabezas",en:"Court of the Seven-Headed Serpent"},
    patron: "Infernal Noble",
    rating: 1000,
    glory: 10,
    stash: 0,
    gloryUnspent: 2
  },

  units: [
    /* ── ELITES ──────────────────────────────────────────────── */
    {
      id:"sorcerer", type:"elite", status:"active",
      name:{es:"Sorcerer",en:"Sorcerer"},
      cost:"170D", move:'6"/Fly', melee:"+1D", ranged:"+1D", armour:"-3",
      keywords:["Negate Shrapnel","Negate Fire","Fear","Flying","Demonic","The Court","Goetic"],
      weapons:[
        {name:{es:"Trench Shield",en:"Trench Shield"},range:"Melee",hands:"1H",
         rule:{es:"Bonus defensivo en melee. Shield Combo: no ocupa mano extra al usar arma 2H con esa indicación.",en:"Defensive bonus in melee. Shield Combo: doesn't occupy hand when using a 2H weapon with that notation."}}
      ],
      abilities:[
        {name:{es:"Forbidden Pleasures",en:"Forbidden Pleasures"},cost:null,goetic:false,alert:true,
         desc:{es:"HABILIDAD PRE-PARTIDA (no es hechizo). Al inicio de cada partida antes del despliegue: elige 1 modelo aliado SIN Demonic por cada modelo de tu banda con esta habilidad → coloca 3 BM junto a él. (Sorcerer + Praetor = hasta 2 modelos.)",en:"PRE-GAME ABILITY (not a spell). At the start of each game before deployment: pick 1 friendly non-Demonic model per warband model with this ability → place 3 BM next to it. (Sorcerer + Praetor = up to 2 models.)"}},
        {name:{es:"Burning Inferno",en:"Burning Inferno"},cost:"1–3 BM",goetic:true,alert:false,
         desc:{es:"Cast Spell Action. Selecciona un PUNTO a 36\" en LoS. Ranged Attack Action: no sufre penalización por Cover. Blast: radio = BM pagados. Keyword FIRE. Ignore Armour solo en impacto directo. En fallo: cae (7 − dado) pulgadas lejos, dirección a elección del oponente.",en:"Cast Spell Action. Select a POINT within 36\" in LoS. Ranged Attack Action: no Cover penalty. Blast radius = BM paid. FIRE keyword. Ignore Armour on direct hit only. On miss: deviates (7 − roll) inches away, direction chosen by opponent."}},

   Each entry fires a pre-game checklist item when trigger(roster) is true.
   roster includes active + reserve units (dead excluded by generateChecklist).
   ═══════════════════════════════════════════════════════════════════ */
const _hasAbility    = (u, nameEn) => (u.abilities||[]).some(a => (a.name.en||a.name.es||'').toLowerCase() === nameEn.toLowerCase());
const _hasInjury     = (u, nameEn) => (u.injuries||[]).some(i => (i.name.en||i.name.es||'').toLowerCase() === nameEn.toLowerCase());
const _hasKeyword    = (u, kw)     => (u.keywords||[]).some(k => k.toLowerCase() === kw.toLowerCase());
const _hasAbilityId  = (u, id)     => (u.abilityIds||[]).includes(id);
const _hasUpgradeId  = (u, partial)=> (u.upgradeIds||[]).some(id => id.includes(partial));
const _hasKwId       = (u, kwId)   => (u.keywordIds||[]).includes(kwId);
const _isActive      = u => u.status === 'active';

const CHECKLIST_TRIGGERS = [
  {
    id: 'fp',
    trigger: r => {
      const active = r.filter(_isActive);
      // When synced: check upgrade IDs (purchased) OR static abilities (own warband overlay)
      if (tcRoster) return active.some(u => _hasUpgradeId(u,'forbidden') || _hasAbility(u,'Forbidden Pleasures'));
      // Static fallback: only apply for own warband
      return String(activeTcId) === TC_ID && active.some(u => _hasAbility(u,'Forbidden Pleasures'));
    },
    label: r => {
      const _hasFP = u => tcRoster
        ? (_hasUpgradeId(u,'forbidden') || _hasAbility(u,'Forbidden Pleasures'))
        : _hasAbility(u,'Forbidden Pleasures');
      const cnt = r.filter(u => _isActive(u) && _hasFP(u)).length;
      const names = r.filter(u => _isActive(u) && _hasFP(u)).map(u => t(u.name)).join(' + ');
      return {
        es: `☠ FORBIDDEN PLEASURES (${names}): elige ${cnt} modelo(s) aliado(s) SIN Demonic → coloca 3 BM en cada uno. (Objetivo ideal: Wretched)`,

  {

    trigger: r => r.filter(_isActive).some(u => tcRoster ? _hasKwId(u,'kw_demonic') : _hasKeyword(u,'Demonic')),

    label: () => ({

      return {

      return {

function generateChecklist(roster) {
  const r = (roster||[]).filter(u => u.status !== 'dead');
  return CHECKLIST_TRIGGERS
    .filter(trig => trig.trigger(r))
    .map(trig => ({ id: trig.id, label: trig.label(r) }));
}

/* ═══════════════════════════════════════════════════════════════════
   TC ID — reads from URL param ?id=XXXX, falls back to TC_ID const
   ═══════════════════════════════════════════════════════════════════ */
const urlId = new URLSearchParams(window.location.search).get('id');
let activeTcId = urlId || TC_ID;
let activeTcUrl = `https://trench-companion.com/warband/detail/${activeTcId}`;

function applyTcId() {
  const input = document.getElementById('tc-id-input');
  const val = input.value.trim();
  if (!val || !/^\d+$/.test(val)) { input.focus(); return; }
  if (val === activeTcId) { syncFromTC(); return; }
  const url = new URL(window.location.href);
  url.searchParams.set('id', val);
  window.location.href = url.toString();
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem('tc_state_'+activeTcId)) || {bm:{}, checklist:{}, injuries:{}, pregameRolls:{}};
  } catch(e) { return {bm:{}, checklist:{}, injuries:{}, pregameRolls:{}}; }
}
function saveState() {
  try { localStorage.setItem('tc_state_'+activeTcId, JSON.stringify(state)); } catch(e) {}
}

/* ═══════════════════════════════════════════════════════════════════
   LANG
   ═══════════════════════════════════════════════════════════════════ */
function t(obj) { return obj[lang] || obj.es || obj.en || ''; }

function toggleLang() {
  lang = lang === 'es' ? 'en' : 'es';
  const label = lang === 'es' ? 'EN' : 'ES';
  const lb = document.getElementById('lang-btn');
  const clb = document.getElementById('camp-lang-btn');
  if (lb) lb.textContent = label;
  if (clb) clb.textContent = label;
  document.documentElement.lang = lang;

  // Campaign view — just re-render cards from cached data
  if (campaignData) { renderCampaignView(campaignData); applyStaticLang(); return; }

  // Detail view — re-render dynamic sections preserving open card state
  const openCards = new Set(
    [...document.querySelectorAll('.unit-card.open')].map(c => c.id.replace('card_',''))
  );
  renderWarnings();
  renderChecklist();
  renderUnits();
  renderFaction();
  openCards.forEach(id => {
    const card = document.getElementById('card_'+id);
    if (card) card.classList.add('open');
  });
  applyStaticLang();
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER HEADER
   ═══════════════════════════════════════════════════════════════════ */
function renderHeader() {
  const m = WARBAND.meta;
  document.getElementById('hdr-tc-link').href = activeTcUrl;
  document.getElementById('tc-id-input').value = activeTcId;
  if (m.tcName) document.getElementById('hdr-name').textContent = m.tcName;
  const factionEl = document.getElementById('hdr-faction');
  factionEl.textContent = m.tcFaction || factionEl.dataset.static || '';
  const stash = m.tcStash ?? m.stash;
  const glory = m.tcGlory ?? m.glory;
  document.getElementById('hdr-stats').innerHTML = `
    <span class="spill"><strong>${m.rating}D</strong> Rating</span>
    <span class="spill"><strong>${glory}G</strong> Glory</span>
    <span class="spill"><strong>${stash}D</strong> Stash</span>
  `;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER WARNING BOX
   ═══════════════════════════════════════════════════════════════════ */
function renderWarnings() {
  const seen = new Set();
  const alerts = [];
  const units = tcRoster || WARBAND.units;
  units.forEach(u => {
    if (u.status === 'dead' || u.status === 'reserve') return;
    (u.abilities || []).filter(a => a.alert).forEach(a => {
      const key = t(a.name);
      if (seen.has(key)) return;
      seen.add(key);
      alerts.push({unit: t(u.name), abl: key, desc: t(a.desc)});
    });
  });
  const title = lang === 'en' ? 'PRE-GAME REMINDERS' : 'RECORDATORIOS PRE-PARTIDA';
  const html = `
    <h3 class="gothic">⚠ ${title}</h3>
    ${alerts.map(a => `<div class="warn-item"><span class="warn-icon">⚠</span><div><strong>${a.unit} — ${a.abl}:</strong> ${a.desc}</div></div>`).join('')}
  `;
  document.getElementById('warn-box').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER CHECKLIST
   ═══════════════════════════════════════════════════════════════════ */
function renderChecklist() {
  const body = document.getElementById('checklist-body');
  const roster = tcRoster || WARBAND.units;
  const items = generateChecklist(roster);
  body.innerHTML = items.map(item => {
    if (item.id === 'shell') {
      const affected = roster.filter(u => _isActive(u) && u.type === 'elite' && _hasInjury(u, 'Shell Shocked'));
      return renderRollChecklist(item, affected, 'shell');
    }
    if (item.id === 'old_wound') {
      const affected = roster.filter(u => u.status !== 'dead' && _hasInjury(u, 'Old Wound'));
      return renderRollChecklist(item, affected, 'oldwound');
    }
    const checked = state.checklist[item.id] ? 'checked' : '';
    return `<div class="chk-item">
      <input type="checkbox" id="chk_${item.id}" ${checked} onchange="toggleCheck('${item.id}',this.checked)">
      <label for="chk_${item.id}">${t(item.label)}</label>
    </div>`;
  }).join('');
}

function renderRollChecklist(item, affectedUnits, rollType) {
  const zones = affectedUnits.map(u => {
    const rs = (state.pregameRolls || {})[u.id]?.[rollType] || null;
    const hitBtn   = `<button class="roll-btn${rs==='hit'?' roll-hit':''}" onclick="recordRoll('${u.id}','${rollType}',true)">1-2 ✗</button>`;
    const clearBtn = `<button class="roll-btn${rs==='clear'?' roll-clear':''}" onclick="recordRoll('${u.id}','${rollType}',false)">3-6 ✓</button>`;
    return `<div class="roll-zone"><strong>${t(u.name)}</strong>: ${hitBtn}${clearBtn}</div>`;
  }).join('');
  return `<div class="chk-item" style="flex-direction:column;align-items:flex-start;gap:2px">
    <label style="font-weight:600">${t(item.label)}</label>
    ${zones}
  </div>`;
}

function recordRoll(unitId, type, hit) {
  if (!state.pregameRolls) state.pregameRolls = {};
  if (!state.pregameRolls[unitId]) state.pregameRolls[unitId] = {};
  state.pregameRolls[unitId][type] = hit ? 'hit' : 'clear';
  saveState();
  renderChecklist();
  renderUnits();
}

function toggleCheck(id, val) {
  state.checklist[id] = val;
  saveState();
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER UNITS
   ═══════════════════════════════════════════════════════════════════ */
const typeOrder = ['elite','troop','mercenary','reserve'];
const typeLabel = {elite:{es:'Elite',en:'Elite'}, troop:{es:'Tropa',en:'Troop'}, mercenary:{es:'Mercenario',en:'Mercenary'}, reserve:{es:'Reserves',en:'Reserves'}};

function renderUnits() {
  const body = document.getElementById('units-body');
  const allUnits = tcRoster || WARBAND.units;
  let html = '';
  typeOrder.forEach(type => {
    const filtered = allUnits.filter(u => u.type === type && u.status !== 'dead');
    if (!filtered.length) return;
    html += `<div class="grp-hdr">${typeLabel[type].es} / ${typeLabel[type].en}</div>`;
    filtered.forEach(u => { html += renderUnitCard(u); });
  });
  body.innerHTML = html;
  allUnits.forEach(u => { if (u.status !== 'dead') attachBmListeners(u.id); });
}

function renderUnitCard(u) {
  // Works with both tcRoster units (flat props) and static WARBAND units (+ overlay)
  const ov = tcRoster ? {} : (tcOverlay[u.id] || {});
  const effectiveStatus = u.status;
  const effectiveCost   = u.cost;
  const xp = u.xp !== undefined ? u.xp : (ov.xp || 0);
  const scars = u.scars || 0;
  const allInjuries = tcRoster ? (u.injuries || []) : [...(u.injuries || []), ...(ov.extraInjuries || [])];
  const extraAdvs = tcRoster ? (u.tcExtraAdvs || []) : (ov.extraAdvs || []);
  const bm = state.bm[u.id] || 0;
  const hasInj = allInjuries.length > 0;
  const typeCls = {elite:'t-elite',troop:'t-troop',mercenary:'t-merc',reserve:'t-reserve'}[u.type];
  const nameCls = effectiveStatus === 'dead' ? 'uname dead' : 'uname';
  const rolls = (state.pregameRolls || {})[u.id] || {};
  const startsDown = rolls.oldwound === 'hit';

  const xpBadge = xp > 0 ? `<span class="xp-badge" title="XP / Battle Scars">${xp}XP${scars > 0 ? ` ✦${scars}` : ''}</span>` : '';
  return `<div class="unit-card${startsDown ? ' starts-down' : ''}" id="card_${u.id}">
  <div class="unit-hdr" onclick="toggleCard('${u.id}')">
    <span class="tbadge ${typeCls}">${typeLabel[u.type].es}</span>
    <span class="${nameCls}">${t(u.name)}</span>
    <span class="ucost">${effectiveCost}</span>
    ${xpBadge}
    <div class="uqs">
      <div class="uq"><span class="uq-lbl">MOV</span>${u.move}</div>
      <div class="uq"><span class="uq-lbl">MEL</span>${u.melee}</div>
      <div class="uq"><span class="uq-lbl">RNG</span>${u.ranged}</div>
      <div class="uq"><span class="uq-lbl">ARM</span>${u.armour}</div>
    </div>
    <span class="inj-dot ${hasInj ? 'on' : ''}" title="Heridas activas"></span>
    <span class="bm-mini ${bm > 0 ? 'on' : ''}" id="bmini_${u.id}">${bm > 0 ? bm+'BM' : ''}</span>
    <span class="chv-u">▼</span>
  </div>
  <div class="unit-body">
    ${renderStats(u)}
    ${renderKeywords(u)}
    ${renderWeapons(u)}
    ${renderAbilities(u, extraAdvs)}
    ${renderInjuries(u, allInjuries)}
    ${u.tcEquipment && u.tcEquipment.length ? renderTcEquipment(u.tcEquipment) : ''}
    ${renderBmCounter(u)}
    ${u.tactics ? `<div class="tactics">📋 ${t(u.tactics)}</div>` : ''}
  </div>
</div>`;
}

function renderStats(u) {
  const rolls = (state.pregameRolls || {})[u.id] || {};
  const penalized = rolls.shell === 'hit';
  const lbl = lang === 'en'
    ? {move:'Move', melee:'Melee', ranged:'Ranged', armour:'Armour'}
    : {move:'Mov', melee:'C.a.C.', ranged:'Distancia', armour:'Armadura'};
  const pc = penalized ? ' penalized' : '';
  return `<div class="stats-row">
    <div class="sbox${pc}"><span class="sval">${u.move}</span><span class="slbl">${lbl.move}</span></div>
    <div class="sbox${pc}"><span class="sval">${u.melee}</span><span class="slbl">${lbl.melee}</span></div>
    <div class="sbox${pc}"><span class="sval">${u.ranged}</span><span class="slbl">${lbl.ranged}</span></div>
    <div class="sbox${pc}"><span class="sval">${u.armour}</span><span class="slbl">${lbl.armour}</span></div>
  </div>`;
}

function renderKeywords(u) {
  if (!u.keywords || !u.keywords.length) return '';
  const warnKws = ['Infiltrator','Hateful','Law of Hell','Tough','Leader','Strong'];
  return `<div class="kws">${u.keywords.map(k => `<span class="kw ${warnKws.includes(k)?'kw-w':''}">${k}</span>`).join('')}</div>`;
}

function renderWeapons(u) {
  if (!u.weapons || !u.weapons.length) return '';
  return `<div class="blk-title">${lang==='en'?'Weapons':'Armamento'}</div>` +
    u.weapons.map(w => `<div class="weap-card">
      <div class="weap-hdr">
        <span class="weap-name">${t(w.name)}</span>
        ${w.range ? `<span class="wstat">📏 ${w.range}</span>` : ''}
        ${w.hands ? `<span class="wstat">${w.hands}</span>` : ''}
      </div>
      <div class="weap-rule">${t(w.rule)}</div>
    </div>`).join('');
}

function renderAbilities(u, extraAdvs = []) {
  const advBadges = extraAdvs.length
    ? `<div style="margin-bottom:5px">${extraAdvs.map(a => `<span class="adv-badge"><span class="adv-name">⚡ ${a}</span><span class="adv-desc">TC</span></span>`).join('')}</div>`
    : '';
  if (!u.abilities || !u.abilities.length) return advBadges ? `<div class="blk-title">${lang==='en'?'Abilities':'Habilidades'}</div>${advBadges}` : '';
  return `<div class="blk-title">${lang==='en'?'Abilities':'Habilidades'}</div>${advBadges}` +
    u.abilities.map(a => {
      const cls = a.goetic ? 'goetic' : (a.alert ? 'alert' : '');
      return `<div class="abl-card ${cls}">
        <div class="abl-hdr">
          ${a.goetic ? '<span style="font-size:10px">🔮</span>' : ''}
          ${a.alert ? '<span style="font-size:10px">⚠</span>' : ''}
          <span class="abl-name">${t(a.name)}</span>
          ${a.cost ? `<span class="gcost">GOETIC ${a.cost}</span>` : ''}
        </div>
        <div class="abl-desc">${t(a.desc)}</div>
      </div>`;
    }).join('');
}

function renderInjuries(u, allInjuries) {
  const injuries = allInjuries || u.injuries;
  if (!injuries || !injuries.length) return '';
  const html = injuries.map((inj, i) => {
    const injId = `${u.id}_${i}`;
    const resolved = state.injuries[injId] || false;
    return `<div class="inj-badge">
      <input type="checkbox" title="Marcar como resuelta" ${resolved?'checked':''} onchange="toggleInjury('${injId}',this.checked)">
      <div>
        <div class="inj-name">${t(inj.name)}</div>
        <div class="inj-eff">${t(inj.effect)}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="blk-title">${lang==='en'?'Injuries':'Heridas'}</div><div class="injury-list">${html}</div>`;
}

function renderTcEquipment(items) {
  if (!items || !items.length) return '';
  const title = lang === 'en' ? 'Equipment (TC Live)' : 'Equipo (TC Live)';
  return `<div class="blk-title">${title}</div>
  <div class="kws">${items.map(e => `<span class="kw">${e}</span>`).join('')}</div>`;
}

function renderBmCounter(u) {
  const bm = state.bm[u.id] || 0;
  const maxPips = 8;
  const pips = Array.from({length: maxPips}, (_, i) =>
    `<div class="bm-pip ${i < bm ? 'filled' : ''}" id="pip_${u.id}_${i}" onclick="setPip('${u.id}',${i})"></div>`
  ).join('');
  return `<div class="bm-ctr">
    <span class="bm-lbl">BM</span>
    <button class="bm-btn" onclick="changeBm('${u.id}',-1)">−</button>
    <div class="bm-pips">${pips}</div>
    <button class="bm-btn" onclick="changeBm('${u.id}',1)">+</button>
    <span class="bm-count" id="bmcount_${u.id}">${bm}</span>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER FACTION
   ═══════════════════════════════════════════════════════════════════ */
function renderFaction() {
  const body = document.getElementById('faction-body');
  body.innerHTML = WARBAND.factionRules.map(r => `
    <div class="abl-card ${r.alert ? 'alert' : ''}">
      <div class="abl-hdr">${r.alert ? '<span>⚠</span>' : ''}<span class="abl-name">${t(r.title)}</span></div>
      <div class="abl-desc">${t(r.body)}</div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════════════════════════
   INTERACTIVITY
   ═══════════════════════════════════════════════════════════════════ */
function toggleCard(id) {
  const card = document.getElementById('card_'+id);
  card.classList.toggle('open');
}

function toggleSec(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function toggleInjury(id, val) {
  state.injuries[id] = val;
  saveState();
}

function changeBm(id, delta) {
  const cur = state.bm[id] || 0;
  const newVal = Math.max(0, cur + delta);
  updateBm(id, newVal);
}

function setPip(unitId, idx) {
  const cur = state.bm[unitId] || 0;
  const newVal = cur === idx + 1 ? idx : idx + 1;
  updateBm(unitId, newVal);
}

function updateBm(id, val) {
  state.bm[id] = val;
  saveState();
  const maxPips = 8;
  for (let i = 0; i < maxPips; i++) {
    const pip = document.getElementById(`pip_${id}_${i}`);
    if (pip) pip.classList.toggle('filled', i < val);
  }
  const cnt = document.getElementById('bmcount_'+id);
  if (cnt) cnt.textContent = val;
  const mini = document.getElementById('bmini_'+id);
  if (mini) {
    mini.textContent = val > 0 ? val+'BM' : '';
    mini.classList.toggle('on', val > 0);
  }
}

function attachBmListeners(id) {
  // pips are rendered with inline onclick, no extra listeners needed
}

function resetGame() {
  if (!confirm('¿Resetear todos los BM, checklist y tiradas pre-partida?')) return;
  state.bm = {}; state.checklist = {}; state.pregameRolls = {};
  saveState();
  renderChecklist();
  renderUnits();
}

function renderCampaignView(wbList) {
  const grid = document.getElementById('camp-grid');
  if (!wbList || !wbList.length) { grid.textContent = '⚠ Sin datos'; return; }
  grid.innerHTML = wbList.map(wb => {
    const hasAlert = wb.alerts && wb.alerts.length > 0;
    return `<div class="wb-card${hasAlert?' wb-card-alert':''}" onclick="selectWarband('${wb.id}')">
      <div class="wb-card-name">${wb.name}</div>
      <div class="wb-card-faction">${wb.faction}</div>
      <div class="wb-card-stats">
        <span class="wb-card-stat">⚔ ${wb.vp} VP</span>
        ${(wb.alerts||[]).map(a => `<span class="wb-card-stat wb-alert">⚠ ${a}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function buildUnitFromTc(mo) {
  const mdType = mo.model;
  const status = mo.active === 'dead' ? 'dead' : mo.active === 'reserved' ? 'reserve' : 'active';
  const cmp = TC_COMPENDIUM[mdType] || null;
  // Only overlay rich static text (abilities, weapons, FP) when viewing own warband
  const staticUnit = (String(activeTcId) === TC_ID && TC_MODEL_TO_ID[mdType])
    ? WARBAND.units.find(u => u.id === TC_MODEL_TO_ID[mdType])
    : null;

  const upgradeIds  = (mo.list_upgrades || []).map(u => u.object_id).filter(Boolean);
  const tcEquipment = (mo.equipment     || []).map(e => e.equipment && e.equipment.name).filter(Boolean);
  const keywordIds  = (cmp?.keywords || staticUnit?.keywords || []).map(k =>
    'kw_' + k.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  const abilityIds  = (staticUnit?.abilities || []).map(a => {
    const name = (a.name.en || a.name.es || '').toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
    return 'ab_' + name;
  });
  const isElite = mo.elite || (cmp?.type === 'elite') || (staticUnit?.type === 'elite');

  const injuries = (mo.list_injury || []).map(inj => {
    const id = inj.object_id;
    const name = injuryName(id);
    const staticInj = staticUnit?.injuries?.find(i =>
      (i.name.en||i.name.es||'').toLowerCase() === name.toLowerCase());
    return staticInj || { name:{es:name,en:name}, effect:{es:'ver TC',en:'see TC'}, injuryId: id };
  });

  return {
    id: `${mdType}_${(mo.name||mo.model_name||mdType).replace(/\s+/g,'_').toLowerCase()}`,
    modelId:   mdType,
    name:      { es: mo.name||mo.model_name||mdType, en: mo.name||mo.model_name||mdType },
    modelName: mo.model_name || mdType,
    type:      isElite ? 'elite' : 'troop',
    status,
    move:      staticUnit?.move   || cmp?.move   || '?',
    melee:     staticUnit?.melee  || cmp?.melee  || '?',
    ranged:    staticUnit?.ranged || cmp?.ranged || '?',
    armour:    staticUnit?.armour || cmp?.armour || '?',
    keywords:  staticUnit?.keywords || cmp?.keywords || [],
    keywordIds,
    abilityIds,
    upgradeIds,
    abilities: staticUnit?.abilities || [],
    weapons:   staticUnit?.weapons   || [],
    injuries,
    tactics:   staticUnit?.tactics || null,
    cost:      mo.cost ? `${mo.cost}D` : '?D',
    tcEquipment,
  };
}

async function fetchWithProxies(url) {
  let res = await fetch(url).catch(() => null);
  for (const proxy of CORS_PROXIES) {
    if (res && res.ok) break;
    res = await fetch(proxy + encodeURIComponent(url)).catch(() => null);
  }
  return (res && res.ok) ? res : null;
}

async function syncFromTC() {
  const badge = document.getElementById('sync-badge');
  badge.textContent = '⏳'; badge.style.display = 'inline';
  try {
    const apiUrl = `https://synod.trench-companion.com/wp-json/synod/v1/multi-dataset?warbands=${activeTcId}`;
    const res = await fetchWithProxies(apiUrl);
    if (!res) { hideLoading(); badge.textContent = '⚠ Offline'; return; }

    const data = await res.json();
    const wbRaw = data.warbands?.[activeTcId]?.warband_data;
    const wb = typeof wbRaw === 'string' ? JSON.parse(wbRaw) : wbRaw;
    if (!wb) { hideLoading(); badge.textContent = '⚠ No data'; return; }

    WARBAND.meta.tcName  = wb.name       || WARBAND.meta.tcName;
    WARBAND.meta.tcStash = wb.ducat_bank ?? wb.ducats ?? WARBAND.meta.stash;
    WARBAND.meta.tcGlory = wb.glory_bank ?? wb.glory  ?? WARBAND.meta.glory;
    if (wb.faction) WARBAND.meta.tcFaction = FACTION_NAMES[wb.faction] || wb.faction;

    const newRoster = (wb.models || []).map(m => buildUnitFromTc(m.model || m));

    tcRoster = newRoster;
    renderHeader();
    renderWarnings();
    renderChecklist();
    renderUnits();
    renderFaction();
    applyStaticLang();
    hideLoading();
    badge.textContent = `⚡ ${newRoster.filter(u => u.status !== 'dead').length} models`;
  } catch(e) {
    console.error('[TC Sync]', e);
    hideLoading();
    badge.textContent = '⚠ Error';
    badge.style.display = 'inline';
  }
}

  if (!urlId) {
    document.getElementById('campaign-view').style.display = 'block';
    applyStaticLang();
    loadCampaign();
  } else {
    document.getElementById('detail-view').style.display = 'block';
    const msg = document.getElementById('lo-msg');
    if (msg) msg.textContent = lang === 'en'
      ? `Loading warband ${urlId}…`
      : `Cargando banda ${urlId}…`;
    syncFromTC();
  }
}
